site_name: Mariners Fans Anonymous
site_description: League by-laws, history, and traditions for the Mariners Fans Anonymous Fantasy Football League.
copyright: Mariners Fans Anonymous &middot; Est. 2003

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.tabs
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - By-Laws: bylaws.md
  - Champions: champions.md
  - Managers: managers.md
  - Many Mile: many-mile.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
